<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PulseBoard — Connecting…</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: #fff; border-radius: 12px; border: 1px solid #e5e5e5; padding: 2rem 2.5rem; text-align: center; max-width: 420px; width: 90%; }
    .logo { font-size: 28px; margin-bottom: 1rem; }
    h1 { font-size: 20px; font-weight: 500; color: #111; margin-bottom: 8px; }
    p { font-size: 14px; color: #666; line-height: 1.6; margin-bottom: 1rem; }
    .spinner { display: inline-block; width: 22px; height: 22px; border: 2px solid #ddd; border-top-color: #E24B4A; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .success { color: #3B6D11; font-weight: 500; }
    .error { color: #A32D2D; }
    .code-box { background: #f5f5f5; border-radius: 8px; padding: 12px; font-family: monospace; font-size: 11px; color: #111; word-break: break-all; margin: 12px 0; text-align: left; border: 1px solid #e5e5e5; }
    .btn { display: inline-block; margin-top: 12px; padding: 10px 24px; background: #E24B4A; color: #fff; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; border: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">⚡</div>
    <h1>PulseBoard</h1>
    <div id="content">
      <p><span class="spinner"></span> Completing Tesla authorization…</p>
    </div>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    const error = params.get('error');
    const el = document.getElementById('content');

    if (error) {
      el.innerHTML = `<p class="error">Authorization failed: ${error}</p>`;
    } else if (code) {
      // Store raw code in localStorage
      localStorage.setItem('pb_auth_code', code);
      localStorage.setItem('pb_auth_code_ts', Date.now().toString());
      el.innerHTML = `<p class="success">✓ Authorized! Returning to PulseBoard…</p><p style="font-size:11px;color:#999;">Code: ${code.substring(0,20)}…</p>`;
      // Pass code via localStorage only — no URL encoding issues
      setTimeout(() => {
        window.location.href = 'https://6shetty9.github.io/pulseboard/';
      }, 800);
    } else {
      el.innerHTML = `<p>No code found. <a href="https://6shetty9.github.io/pulseboard/">Back to PulseBoard</a></p>`;
    }
  </script>
</body>
</html>
